# 与 requirements.txt 保持同步；更新 pip 包时请同时改两份文件。
# 运行/调试：conda activate tpms（详见 docs/05_ENVIRONMENT.md）
name: tpms
channels:
  - conda-forge
  - defaults
dependencies:
  - python=3.11
  - numpy
  - scikit-image
  - vtk
  - pip
  - pip:
    - PySide6
    - pyvista
    - pyvistaqt
    - pyyaml
    - trimesh
